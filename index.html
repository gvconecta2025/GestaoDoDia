<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão do Dia - Cadernetas Realistas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Base do papel */
        .papel-base {
            background-color: #faf9f6; /* Cor de papel levemente creme */
            transition: background-image 0.2s ease-in-out;
        }

        /* Efeito de Papel Pautado (linhas horizontais) */
        .papel-pautado {
            background-image: repeating-linear-gradient(transparent, transparent 31px, #e2e8f0 31px, #e2e8f0 32px);
            background-attachment: local;
        }

        /* Efeito de Papel Liso */
        .papel-liso {
            background-image: none;
        }

        /* Espiral Metálico (Twin Wire) */
        .espiral-container { position: absolute; top: -12px; left: 0; width: 100%; display: flex; justify-content: space-evenly; z-index: 20; }
        .anel-espiral { 
            width: 8px; height: 24px; 
            background: linear-gradient(to right, #94a3b8, #e2e8f0, #94a3b8);
            border-radius: 10px; border: 1px solid #64748b;
            box-shadow: 1px 2px 3px rgba(0,0,0,0.3);
        }
        .furo-papel {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 10px; height: 10px; background-color: #f1f5f9; /* cor do fundo da tela */
            border-radius: 50%; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Drag and Drop */
        .drag-over { background-color: rgba(254, 252, 232, 0.8) !important; border-style: dashed; }
        .task-card { cursor: grab; background-color: transparent; border-bottom: 1px solid transparent; }
        .task-card:active { cursor: grabbing; transform: scale(0.98); }
        .task-card[draggable="false"] { cursor: default; }
        
        /* Botão de Criação Flutuante */
        .btn-criacao {
            position: absolute; bottom: -20px; right: 20px;
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s, background-color 0.2s;
            z-index: 30;
        }
        .btn-criacao:hover { transform: scale(1.1); }
        
        /* Ajuste visual para o texto ficar em cima da linha do papel */
        .texto-tarefa { line-height: 32px; padding-top: 2px; }
    </style>
</head>
<body class="bg-slate-200 h-screen flex overflow-hidden font-sans text-slate-800">

    <aside class="w-60 bg-slate-900 text-white flex flex-col p-6 shadow-xl hidden md:flex shrink-0 z-40">
        <div class="mb-10">
            <h1 class="text-2xl font-bold tracking-tighter">LOGO</h1>
            <span class="text-[10px] text-slate-400 font-mono">VERSÃO 2.1</span>
        </div>
        <nav class="flex-1 space-y-2">
            <button class="flex items-center gap-3 w-full p-3 bg-blue-600 rounded-lg text-sm font-bold transition hover:bg-blue-700">
                <i class="fa-solid fa-table-columns w-4"></i> Projetos
            </button>
            <div class="pt-6 mt-6 border-t border-slate-700 space-y-2">
                <p class="text-xs font-bold text-slate-500 uppercase">Ajustes Rápidos</p>
                
                <button id="toggleLinesBtn" onclick="toggleLines()" class="flex items-center gap-3 w-full p-3 bg-indigo-600/20 text-indigo-400 rounded-lg text-sm font-bold transition hover:bg-indigo-600 hover:text-white">
                    <i class="fa-solid fa-bars w-4" id="linesIcon"></i> <span id="linesText">Ocultar Pauta</span>
                </button>

                <button id="lockDragBtn" onclick="setDragDisabled(true)" class="flex items-center gap-3 w-full p-3 bg-red-600/20 text-red-400 rounded-lg text-sm font-bold transition hover:bg-red-600 hover:text-white">
                    <i class="fa-solid fa-lock w-4"></i> Travar Arrasto
                </button>
                <button id="unlockDragBtn" onclick="setDragDisabled(false)" class="flex items-center gap-3 w-full p-3 bg-green-600/20 text-green-400 rounded-lg text-sm font-bold transition hover:bg-green-600 hover:text-white hidden">
                    <i class="fa-solid fa-lock-open w-4"></i> Destravar Arrasto
                </button>
            </div>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm shrink-0 z-30">
            <h2 class="text-lg font-bold text-slate-600 uppercase tracking-widest">Gestão do Dia</h2>
        </header>

        <main class="flex-1 overflow-x-auto p-6 md:p-10 pt-12">
            <div class="flex gap-10 h-full min-w-max md:min-w-0" id="board">
                </div>
        </main>
    </div>

    <script>
        // Dados
        let tasks = [
            { id: '1', title: 'Comprar material de escritório', col: 'atrasado', impact: 'alto', completed: false },
            { id: '2', title: 'Reunião de alinhamento', col: 'agora', impact: 'alto', completed: false },
            { id: '3', title: 'Revisar e-mails da semana', col: 'agora', impact: 'normal', completed: false },
            { id: '4', title: 'Planejar viagem', col: 'antecipado', impact: 'baixo', completed: false }
        ];

        const columns = [
            { id: 'atrasado', title: 'Atrasadas', corTopo: 'bg-red-900', corBotao: 'bg-red-600' },
            { id: 'agora', title: 'Agora', corTopo: 'bg-slate-800', corBotao: 'bg-blue-600' },
            { id: 'antecipado', title: 'Antecipado', corTopo: 'bg-teal-900', corBotao: 'bg-teal-600' }
        ];

        const impacts = [
            { id: 'alto', label: 'Alto Impacto', border: 'border-red-400' },
            { id: 'normal', label: 'Normal', border: 'border-amber-400' },
            { id: 'baixo', label: 'Baixo', border: 'border-blue-400' }
        ];

        let draggedTaskId = null;
        let dragDisabled = false;
        let linesEnabled = true; // Estado da Pauta (Ligas/Desligada)

        // Controle da Pauta (Linhas)
        function toggleLines() {
            linesEnabled = !linesEnabled;
            const btnText = document.getElementById('linesText');
            const btnIcon = document.getElementById('linesIcon');
            const papeis = document.querySelectorAll('.papel-base');

            if (linesEnabled) {
                btnText.textContent = "Ocultar Pauta";
                btnIcon.className = "fa-solid fa-bars w-4";
                papeis.forEach(el => {
                    el.classList.add('papel-pautado');
                    el.classList.remove('papel-liso');
                });
            } else {
                btnText.textContent = "Mostrar Pauta";
                btnIcon.className = "fa-regular fa-file w-4";
                papeis.forEach(el => {
                    el.classList.add('papel-liso');
                    el.classList.remove('papel-pautado');
                });
            }
        }

        // Controle de Arrasto
        function setDragDisabled(disabled) {
            dragDisabled = disabled;
            document.getElementById('lockDragBtn').classList.toggle('hidden', disabled);
            document.getElementById('unlockDragBtn').classList.toggle('hidden', !disabled);
            renderBoard(); 
        }

        // Funções de CRUD (Criar, Editar, Excluir)
        function criarTarefa(colId) {
            const title = prompt("Digite a nova tarefa:");
            if(title && title.trim() !== '') {
                tasks.push({
                    id: Date.now().toString(),
                    title: title.trim(),
                    col: colId,
                    impact: 'normal', 
                    completed: false
                });
                renderBoard();
            }
        }

        function editarTarefa(id) {
            const task = tasks.find(t => t.id === id);
            if(task) {
                const newTitle = prompt("Edite sua tarefa:", task.title);
                if(newTitle && newTitle.trim() !== '') {
                    task.title = newTitle.trim();
                    renderBoard();
                }
            }
        }

        function excluirTarefa(id) {
            if(confirm("Tem certeza que deseja excluir esta tarefa?")) {
                tasks = tasks.filter(t => t.id !== id);
                renderBoard();
            }
        }

        function toggleTarefa(id) {
            const task = tasks.find(t => t.id === id);
            if(task) {
                task.completed = !task.completed;
                renderBoard();
            }
        }

        function moverTarefa(id, novaColuna, novoImpacto) {
            const task = tasks.find(t => t.id === id);
            if(task && draggedTaskId) {
                task.col = novaColuna;
                task.impact = novoImpacto;
                renderBoard();
            }
        }

        // Montagem da Tela
        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            // Define qual classe o papel deve ter ao ser renderizado
            const currentPaperClass = linesEnabled ? 'papel-pautado' : 'papel-liso';

            columns.forEach(col => {
                // Estrutura principal da Caderneta
                const caderneta = document.createElement('div');
                caderneta.className = "relative flex-1 flex flex-col min-w-[340px] max-w-[420px] mb-8";

                // Espirais no Topo
                let espiralHTML = '<div class="espiral-container">';
                for(let i=0; i<12; i++) {
                    espiralHTML += `
                        <div class="relative">
                            <div class="anel-espiral"></div>
                            <div class="furo-papel"></div>
                        </div>`;
                }
                espiralHTML += '</div>';

                // Capa superior e Miolo
                let corpoHTML = `
                    <div class="flex-1 flex flex-col rounded-b-xl rounded-t-md shadow-2xl overflow-visible bg-white border border-gray-300 relative">
                        <div class="pt-6 pb-3 px-4 ${col.corTopo} text-white text-center rounded-t-md relative z-10 border-b-4 border-black/20">
                            <h3 class="text-xl font-black uppercase tracking-widest">${col.title}</h3>
                        </div>
                        
                        <div class="papel-base ${currentPaperClass} flex-1 overflow-y-auto p-4 space-y-4" id="zonas-${col.id}">
                            </div>

                        <div class="papel-base ${currentPaperClass} p-4 border-t-2 border-dashed border-slate-300 max-h-32 overflow-y-auto" id="concluidas-${col.id}">
                            <h4 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Concluídas</h4>
                        </div>

                        <button onclick="criarTarefa('${col.id}')" class="btn-criacao ${col.corBotao} text-white" title="Adicionar Tarefa">
                            <i class="fa-solid fa-plus text-xl"></i>
                        </button>
                    </div>
                `;

                caderneta.innerHTML = espiralHTML + corpoHTML;
                board.appendChild(caderneta);

                const zonasContainer = document.getElementById(`zonas-${col.id}`);
                
                // Monta as linhas de Impacto
                impacts.forEach(imp => {
                    const zona = document.createElement('div');
                    zona.className = `min-h-[96px] border-l-4 rounded-r-lg p-2 transition-colors ${imp.border}`;
                    zona.innerHTML = `<span class="text-[10px] font-bold text-slate-400 uppercase bg-white/50 px-1 rounded">${imp.label}</span>`;
                    
                    // Eventos Drag Drop
                    zona.addEventListener('dragover', e => { 
                        if(dragDisabled) return;
                        e.preventDefault(); zona.classList.add('drag-over'); 
                    });
                    zona.addEventListener('dragleave', () => zona.classList.remove('drag-over'));
                    zona.addEventListener('drop', e => {
                        if(dragDisabled) return;
                        e.preventDefault();
                        zona.classList.remove('drag-over');
                        moverTarefa(draggedTaskId, col.id, imp.id);
                    });

                    // Insere as tarefas
                    const tarefasAtivas = tasks.filter(t => t.col === col.id && t.impact === imp.id && !t.completed);
                    tarefasAtivas.forEach(task => zona.appendChild(criarElementoTarefa(task)));

                    zonasContainer.appendChild(zona);
                });

                // Tarefas Concluídas
                const concluidasContainer = document.getElementById(`concluidas-${col.id}`);
                const tarefasConcluidas = tasks.filter(t => t.col === col.id && t.completed);
                tarefasConcluidas.forEach(task => concluidasContainer.appendChild(criarElementoTarefa(task)));
            });
        }

        // Monta o visual de cada tarefa
        function criarElementoTarefa(task) {
            const div = document.createElement('div');
            
            if (task.completed) {
                div.className = "flex items-center gap-2 opacity-50 mb-1 pl-2 group";
                div.innerHTML = `
                    <i class="fa-solid fa-check text-slate-400 shrink-0 cursor-pointer" onclick="toggleTarefa('${task.id}')"></i>
                    <span class="text-sm line-through font-medium text-slate-500 truncate texto-tarefa">${task.title}</span>
                    <i class="fa-solid fa-trash text-red-500 text-xs opacity-0 group-hover:opacity-100 cursor-pointer ml-auto" onclick="excluirTarefa('${task.id}')"></i>
                `;
            } else {
                div.className = "task-card flex items-start gap-3 pl-1 pr-2 mt-1 group";
                div.draggable = !dragDisabled;
                
                div.addEventListener('dragstart', (e) => { 
                    if(dragDisabled) { e.preventDefault(); return; }
                    draggedTaskId = task.id; setTimeout(() => div.style.opacity = '0.4', 0); 
                });
                div.addEventListener('dragend', () => { draggedTaskId = null; div.style.opacity = '1'; });

                div.innerHTML = `
                    <i class="fa-solid fa-grip-vertical text-slate-300 mt-2 shrink-0 ${dragDisabled ? 'hidden' : 'cursor-grab'}"></i>
                    <input type="checkbox" onclick="toggleTarefa('${task.id}')" class="mt-2.5 w-4 h-4 cursor-pointer accent-slate-800 shrink-0">
                    <span class="flex-1 text-sm font-semibold texto-tarefa overflow-hidden text-ellipsis">${task.title}</span>
                    
                    <div class="flex gap-3 mt-2 opacity-0 group-hover:opacity-100 transition-opacity md:opacity-0 opacity-100 shrink-0">
                        <button onclick="editarTarefa('${task.id}')" title="Editar"><i class="fa-solid fa-pen text-blue-500 text-xs hover:text-blue-700"></i></button>
                        <button onclick="excluirTarefa('${task.id}')" title="Excluir"><i class="fa-solid fa-trash text-red-500 text-xs hover:text-red-700"></i></button>
                    </div>
                `;
            }
            return div;
        }

        // Inicializa
        renderBoard();
    </script>
</body>
</html>
