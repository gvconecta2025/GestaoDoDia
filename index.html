<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão do Dia - PRO + Cloud</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>

    <style>
        /* Oculta scrollbar na navegação horizontal do board no mobile */
        .hide-scroll-x::-webkit-scrollbar { display: none; }
        .hide-scroll-x { -ms-overflow-style: none; scrollbar-width: none; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .papel-base { background-color: #faf9f6 !important; color: #1e293b !important; border-color: #e2e8f0 !important; }
        .papel-pautado { background-image: repeating-linear-gradient(transparent, transparent 31px, rgba(148, 163, 184, 0.4) 31px, rgba(148, 163, 184, 0.4) 32px) !important; background-attachment: local; background-position: 0 0; }
        .papel-liso { background-image: none !important; }

        .espiral-container { position: absolute; top: -12px; left: 0; width: 100%; display: flex; justify-content: space-evenly; z-index: 20; }
        .anel-espiral { width: 8px; height: 24px; background: linear-gradient(to right, #94a3b8, #e2e8f0, #94a3b8); border-radius: 10px; border: 1px solid #64748b; box-shadow: 1px 2px 3px rgba(0,0,0,0.3); }
        .furo-papel { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 10px; height: 10px; background-color: #f1f5f9; border-radius: 50%; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5); z-index: 10; transition: background-color 0.3s; }

        .drag-over { background-color: rgba(254, 252, 232, 0.8) !important; border-style: dashed; }
        
        .task-card { cursor: grab; background-color: transparent; min-height: 32px; margin-bottom: 0px; }
        .task-card.dragging { opacity: 0.4; }
        .task-card:active { cursor: grabbing; transform: scale(0.99); }
        .task-card[draggable="false"] { cursor: default; }
        
        .task-title-wrap { line-height: 32px; white-space: normal; word-break: break-word; }

        .btn-criacao { position: absolute; bottom: -20px; right: 20px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: transform 0.2s; z-index: 30; }
        .btn-criacao:hover { transform: scale(1.1); }
        .badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 12px; line-height: 1; vertical-align: middle; display: inline-flex; align-items: center; gap: 4px; margin-left: 6px; margin-top: 4px; margin-bottom: 4px;}
        .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #3b82f6; width: 24px; height: 24px; -webkit-animation: spin 1s linear infinite; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Temas Dinâmicos */
        body.theme-escuro { background-color: #0f172a !important; } body.theme-escuro .furo-papel { background-color: #0f172a; }
        body.theme-cafe { background-color: #3e2723 !important; } body.theme-cafe .furo-papel { background-color: #3e2723; }
        body.theme-caputinno { background-color: #d7ccc8 !important; } body.theme-caputinno .furo-papel { background-color: #d7ccc8; }
        body.theme-polen { background-color: #fbc02d !important; } body.theme-polen .furo-papel { background-color: #fbc02d; }
    </style>
</head>
<body class="bg-slate-200 h-screen flex overflow-hidden font-sans text-slate-800 transition-colors duration-300 theme-claro">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tighter mb-2">Gestão do Dia</h2>
            <p class="text-sm text-slate-500 font-medium mb-6">Acesse para sincronizar na nuvem</p>
            
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">E-mail</label>
                    <input type="email" id="emailInput" required class="w-full border-2 border-slate-200 rounded-xl p-3 text-sm focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Senha</label>
                    <div class="relative">
                        <input type="password" id="passwordInput" required class="w-full border-2 border-slate-200 rounded-xl p-3 text-sm focus:border-blue-500 outline-none pr-10">
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-3.5 text-slate-400 hover:text-slate-600"><i class="fa-solid fa-eye" id="eyeIcon"></i></button>
                    </div>
                </div>
                <div id="loginError" class="text-red-500 text-xs font-bold hidden">Credenciais inválidas.</div>
                
                <div class="flex justify-between items-center pt-2">
                    <button type="button" onclick="abrirModalContasSalvas()" class="text-xs font-bold text-blue-500 hover:text-blue-700">Alternar Conta</button>
                    <button type="submit" id="loginBtn" class="bg-slate-900 text-white font-bold rounded-xl px-5 py-3 hover:bg-slate-800 transition-colors flex items-center gap-2">Entrar <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </form>
        </div>
    </div>

    <div id="accountsModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 mx-4 transform scale-95 transition-transform duration-200" id="accountsModalContent">
            <div class="flex justify-between items-center mb-5 shrink-0">
                <h3 class="text-xl font-black text-slate-800 tracking-tight"><i class="fa-solid fa-users text-blue-500 mr-2"></i> Contas Salvas</h3>
                <button onclick="fecharModal('accountsModal')" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div id="accountsList" class="space-y-2 max-h-60 overflow-y-auto mb-4"></div>
            <button onclick="abrirNovaConta()" class="w-full border-2 border-dashed border-slate-300 text-slate-500 font-bold rounded-xl p-3 hover:bg-slate-50 transition-colors"><i class="fa-solid fa-plus mr-1"></i> Nova Conta</button>
        </div>
    </div>

    <div id="mobileMenuOverlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[35] hidden md:hidden"></div>

    <aside id="sidebar" class="w-64 md:w-60 bg-slate-900 text-white flex flex-col p-6 shadow-2xl fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 z-40">
        <div class="mb-10 flex justify-between items-start relative">
            <div>
                <h1 class="text-2xl font-bold tracking-tighter">LOGO</h1>
                <span class="text-[10px] text-slate-400 font-mono">VERSÃO 5.0 MOBILE</span>
            </div>
            <div id="syncStatus" class="text-blue-400" title="Sincronizado"><i class="fa-solid fa-cloud-check"></i></div>
            <button onclick="toggleMobileMenu()" class="md:hidden absolute -right-2 -top-2 text-slate-400 hover:text-white p-2"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        
        <nav class="flex-1 space-y-2 overflow-y-auto pr-2 pb-20 md:pb-0">
            <button onclick="abrirModalProjetos(); toggleMobileMenu();" class="flex items-center gap-3 w-full p-3 bg-blue-600 rounded-lg text-sm font-bold transition hover:bg-blue-700">
                <i class="fa-solid fa-table-columns w-4"></i> Projetos
            </button>
            
            <div class="pt-6 mt-6 border-t border-slate-700 space-y-2">
                <p class="text-xs font-bold text-slate-500 uppercase">Ajustes Rápidos</p>
                <button onclick="toggleLines(); toggleMobileMenu();" class="flex items-center gap-3 w-full p-3 bg-indigo-600/20 text-indigo-400 rounded-lg text-sm font-bold transition hover:bg-indigo-600 hover:text-white">
                    <i class="fa-solid fa-bars w-4" id="linesIcon"></i> <span id="linesText">Mostrar Pauta</span>
                </button>
                <button id="lockDragBtn" onclick="setDragDisabled(true); toggleMobileMenu();" class="flex items-center gap-3 w-full p-3 bg-red-600/20 text-red-400 rounded-lg text-sm font-bold transition hover:bg-red-600 hover:text-white">
                    <i class="fa-solid fa-lock w-4"></i> Travar Arrasto
                </button>
                <button id="unlockDragBtn" onclick="setDragDisabled(false); toggleMobileMenu();" class="flex items-center gap-3 w-full p-3 bg-green-600/20 text-green-400 rounded-lg text-sm font-bold transition hover:bg-green-600 hover:text-white hidden">
                    <i class="fa-solid fa-lock-open w-4"></i> Destravar Arrasto
                </button>
            </div>

            <div class="pt-6 mt-6 border-t border-slate-700 space-y-2">
                <button onclick="abrirModalTags(); toggleMobileMenu();" class="flex items-center gap-3 w-full p-3 bg-slate-800 text-slate-300 rounded-lg text-sm font-bold transition hover:bg-slate-700 hover:text-white border border-slate-700">
                    <i class="fa-solid fa-tags w-4 text-amber-500"></i> Etiquetas
                </button>
                <button onclick="abrirModalTemas(); toggleMobileMenu();" class="flex items-center gap-3 w-full p-3 bg-slate-800 text-slate-300 rounded-lg text-sm font-bold transition hover:bg-slate-700 hover:text-white border border-slate-700">
                    <i class="fa-solid fa-palette w-4 text-pink-500"></i> Tema Visual
                </button>
                <button onclick="abrirModalContasSalvas(); toggleMobileMenu();" class="flex items-center gap-3 w-full p-3 bg-slate-800 text-slate-300 rounded-lg text-sm font-bold transition hover:bg-slate-700 hover:text-white border border-slate-700">
                    <i class="fa-solid fa-users-arrows-right w-4 text-emerald-500"></i> Alternar Conta
                </button>
            </div>
        </nav>
        <button onclick="logout()" class="flex items-center gap-3 p-3 text-slate-400 hover:text-red-400 text-sm transition pt-6 border-t border-slate-700 shrink-0">
            <i class="fa-solid fa-right-from-bracket w-4"></i> Sair
        </button>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">
        
        <header class="h-16 bg-white border-b flex items-center justify-between px-4 md:px-8 shadow-sm shrink-0 z-30 transition-colors">
            <div class="flex items-center gap-3 md:gap-4">
                <button onclick="toggleMobileMenu()" class="md:hidden p-2 text-slate-600 hover:text-slate-900 transition-colors focus:outline-none"><i class="fa-solid fa-bars text-xl"></i></button>
                <h2 class="text-base md:text-lg font-bold text-slate-600 uppercase tracking-widest hidden md:block">Gestão do Dia</h2>
                <span id="headerProjectName" class="badge bg-blue-100 text-blue-700 px-3 py-1 text-sm font-bold truncate max-w-[150px] md:max-w-none">Meu Dia</span>
            </div>
            <div id="userGreeting" class="text-sm font-bold text-slate-500 truncate ml-2"></div>
        </header>

        <main class="flex-1 flex overflow-hidden p-4 md:p-10 pt-8 relative w-full">
            
            <div class="flex gap-6 md:gap-10 h-full w-full overflow-x-auto hide-scroll-x snap-x snap-mandatory pb-24 md:pb-6 scroll-smooth" id="board">
                </div>

            <aside class="w-80 shrink-0 bg-white rounded-2xl shadow-xl border border-slate-200 h-fit p-6 hidden lg:block sticky top-0 transition-colors ml-10">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-black text-slate-800">Calendário</h3>
                    <div class="flex gap-2">
                        <button class="text-slate-400 hover:text-blue-600"><i class="fa-solid fa-chevron-left"></i></button>
                        <span class="text-sm font-bold text-slate-600" id="calMonth">Mês Atual</span>
                        <button class="text-slate-400 hover:text-blue-600"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center mb-2">
                    <span class="text-[10px] font-bold text-slate-400">D</span><span class="text-[10px] font-bold text-slate-400">S</span>
                    <span class="text-[10px] font-bold text-slate-400">T</span><span class="text-[10px] font-bold text-slate-400">Q</span>
                    <span class="text-[10px] font-bold text-slate-400">Q</span><span class="text-[10px] font-bold text-slate-400">S</span>
                    <span class="text-[10px] font-bold text-slate-400">S</span>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center" id="calendarGrid"></div>
            </aside>
        </main>
    </div>

    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-40 flex justify-around pb-safe">
        <button id="nav-btn-atrasado" onclick="scrollToCol('atrasado')" class="mobile-nav-btn flex-1 py-3 text-red-600 transition-colors border-t-2 border-transparent">
            <div class="flex flex-col items-center gap-1"><i class="fa-solid fa-clock-rotate-left text-lg"></i><span class="text-[10px] font-bold uppercase">Atrasadas</span></div>
        </button>
        <button id="nav-btn-agora" onclick="scrollToCol('agora')" class="mobile-nav-btn flex-1 py-3 text-slate-800 transition-colors border-t-2 border-slate-800">
            <div class="flex flex-col items-center gap-1"><i class="fa-solid fa-bolt text-lg text-blue-500"></i><span class="text-[10px] font-bold uppercase text-blue-600">Agora</span></div>
        </button>
        <button id="nav-btn-antecipado" onclick="scrollToCol('antecipado')" class="mobile-nav-btn flex-1 py-3 text-teal-600 transition-colors border-t-2 border-transparent">
            <div class="flex flex-col items-center gap-1"><i class="fa-solid fa-calendar-day text-lg"></i><span class="text-[10px] font-bold uppercase">Antecipadas</span></div>
        </button>
    </nav>

    <div id="taskModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 mx-4 transform scale-95 transition-transform duration-200 max-h-[95vh] flex flex-col" id="taskModalContent">
            <div class="flex justify-between items-center mb-5 shrink-0">
                <h3 id="modalTitle" class="text-xl font-black text-slate-800 tracking-tight">Nova Tarefa</h3>
                <button onclick="fecharModal('taskModal')" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="overflow-y-auto pr-2 flex-1 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Título</label>
                    <input type="text" id="taskInput" autocomplete="off" class="w-full border-2 border-slate-200 rounded-xl p-3 text-slate-700 font-medium focus:border-blue-500 outline-none">
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Início</label>
                        <input type="date" id="taskStart" class="w-full border-2 border-slate-200 rounded-xl p-2 text-sm text-slate-700 focus:border-blue-500 outline-none">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Prazo</label>
                        <input type="date" id="taskEnd" class="w-full border-2 border-slate-200 rounded-xl p-2 text-sm text-slate-700 focus:border-blue-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-2"><i class="fa-solid fa-table-columns"></i> Projetos</label>
                    <div id="projectsContainerModal" class="flex flex-wrap gap-2"></div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-2"><label class="block text-xs font-bold text-slate-500 uppercase tracking-wide">Etiquetas</label></div>
                    <div id="tagsContainer" class="flex flex-wrap gap-2"></div>
                </div>
            </div>
            <div class="flex justify-end gap-3 pt-4 border-t border-slate-100 shrink-0 mt-4">
                <button onclick="fecharModal('taskModal')" class="px-5 py-2.5 rounded-xl text-slate-500 font-bold hover:bg-slate-100">Cancelar</button>
                <button onclick="salvarTarefa()" class="px-5 py-2.5 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 shadow-lg shadow-blue-500/30">Salvar</button>
            </div>
        </div>
    </div>

    <div id="subtasksModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 mx-4 transform scale-95 transition-transform duration-200 flex flex-col max-h-[90vh]" id="subtasksModalContent">
            <div class="flex justify-between items-center mb-2 shrink-0">
                <h3 class="text-xl font-black text-slate-800 tracking-tight"><i class="fa-solid fa-list-check text-blue-500 mr-2"></i> Subtarefas</h3>
                <button onclick="fecharModal('subtasksModal')" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <p id="subtaskTaskTitle" class="text-sm font-bold text-slate-500 mb-5 pb-4 border-b border-slate-100 task-title-wrap"></p>
            <div class="flex-1 overflow-y-auto pr-2 mb-4 space-y-2" id="manageSubtasksList"></div>
            <div class="flex gap-2 shrink-0 pt-4 border-t border-slate-100">
                <input type="text" id="newSubtaskInput" placeholder="Nova subtarefa e teclar Enter..." class="w-full text-sm border-2 border-slate-200 rounded-lg p-2 focus:border-blue-500 outline-none" onkeypress="if(event.key === 'Enter') addSubtaskFromModal()">
                <button type="button" onclick="addSubtaskFromModal()" class="bg-blue-600 text-white px-4 rounded-lg hover:bg-blue-700 font-bold"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>
    </div>

    <div id="projectsModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 mx-4 transform scale-95 transition-transform duration-200 flex flex-col max-h-[90vh]" id="projectsModalContent">
            <div class="flex justify-between items-center mb-5 shrink-0">
                <h3 class="text-xl font-black text-slate-800 tracking-tight"><i class="fa-solid fa-table-columns text-blue-500 mr-2"></i> Projetos</h3>
                <button onclick="fecharModal('projectsModal')" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-6 shrink-0">
                <h4 id="projectFormTitle" class="text-xs font-bold text-slate-500 uppercase tracking-wide mb-3">Criar Projeto</h4>
                <div class="flex gap-2 mb-2"><input type="text" id="projectNameInput" placeholder="Nome do projeto..." class="flex-1 border-2 border-slate-200 rounded-lg p-2 text-sm focus:border-blue-500 outline-none"></div>
                <div class="flex justify-end gap-2 mt-2">
                    <button id="cancelProjEditBtn" onclick="cancelarEdicaoProj()" class="hidden px-4 py-1.5 rounded-lg text-sm text-slate-500 font-bold hover:bg-slate-200">Cancelar</button>
                    <button id="saveProjBtn" onclick="salvarProjeto()" class="px-4 py-1.5 rounded-lg text-sm bg-slate-800 text-white font-bold hover:bg-slate-700">Adicionar</button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto pr-2">
                <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wide mb-3 sticky top-0 bg-white py-1">Seus Projetos</h4>
                <div id="projectsList" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <div id="temasModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 mx-4 transform scale-95 transition-transform duration-200" id="temasModalContent">
            <div class="flex justify-between items-center mb-5 shrink-0">
                <h3 class="text-xl font-black text-slate-800 tracking-tight"><i class="fa-solid fa-palette text-pink-500 mr-2"></i> Tema Visual</h3>
                <button onclick="fecharModal('temasModal')" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="setTema('claro')" class="p-3 border-2 border-slate-200 rounded-xl font-bold text-slate-700 hover:border-slate-400 flex items-center justify-between"><span class="flex items-center gap-2"><div class="w-4 h-4 rounded-full bg-slate-100 border border-slate-300"></div> Claro (Padrão)</span></button>
                <button onclick="setTema('escuro')" class="p-3 border-2 border-slate-200 rounded-xl font-bold text-slate-700 hover:border-slate-400 flex items-center justify-between"><span class="flex items-center gap-2"><div class="w-4 h-4 rounded-full bg-slate-800 border border-slate-900"></div> Escuro</span></button>
                <button onclick="setTema('cafe')" class="p-3 border-2 border-slate-200 rounded-xl font-bold text-slate-700 hover:border-slate-400 flex items-center justify-between"><span class="flex items-center gap-2"><div class="w-4 h-4 rounded-full bg-[#3e2723] border border-[#1b0000]"></div> Café</span></button>
                <button onclick="setTema('caputinno')" class="p-3 border-2 border-slate-200 rounded-xl font-bold text-slate-700 hover:border-slate-400 flex items-center justify-between"><span class="flex items-center gap-2"><div class="w-4 h-4 rounded-full bg-[#d7ccc8] border border-[#a69b97]"></div> Caputinno</span></button>
                <button onclick="setTema('polen')" class="p-3 border-2 border-slate-200 rounded-xl font-bold text-slate-700 hover:border-slate-400 flex items-center justify-between"><span class="flex items-center gap-2"><div class="w-4 h-4 rounded-full bg-[#fbc02d] border border-[#c49000]"></div> Polen</span></button>
            </div>
        </div>
